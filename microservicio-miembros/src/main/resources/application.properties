spring.datasource.url=jdbc:h2:mem:miembrosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
server.port=8081
spring.application.name=microservicio-miembros

# Keycloak JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/gimnasio
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

# Keycloak (cliente confidential)
keycloak.auth-server-url=http://localhost:8180
keycloak.realm=gimnasio
keycloak.resource=gym-backend
keycloak.public-client=false
keycloak.credentials.secret=g7nM2pQ5rT8vX1yB4cF0hJ3kL6nP9sU

logging.level.org.springframework.security=DEBUG

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.streams.application-id=miembros-streams-app
spring.kafka.consumer.group-id=recuperacion-grupo
spring.kafka.consumer.auto-offset-reset=earliest

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
